aid: fargate
name: AWS Fargate
description: >-
  AWS Fargate is a serverless, pay-as-you-go compute engine for containers that
  works with Amazon Elastic Container Service (ECS) and Amazon Elastic Kubernetes
  Service (EKS). It removes the need to provision and manage servers, letting you
  focus on building and running applications without managing infrastructure.
url: https://aws.amazon.com/fargate/
image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
created: '2024-01-01'
modified: '2026-03-16'
specificationVersion: '0.19'
tags:
  - Compute
  - Containers
  - Docker
  - Kubernetes
  - Serverless

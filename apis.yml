  - name: Amazon EKS API (Fargate)
    description: >-
      The Amazon EKS API provides programmatic access to manage Fargate pods through
      Amazon Elastic Kubernetes Service. It supports creating Fargate profiles that
      define which Kubernetes pods run on Fargate infrastructure, enabling serverless
      Kubernetes workloads without managing nodes.
    image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
    baseURL: https://eks.{region}.amazonaws.com
    humanURL: https://docs.aws.amazon.com/eks/latest/APIReference/

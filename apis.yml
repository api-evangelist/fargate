  - name: Amazon ECS API (Fargate)
    description: >-
      The Amazon ECS API provides programmatic access to manage Fargate tasks and
      services through Amazon Elastic Container Service. It supports creating and
      managing clusters, task definitions, services, and container instances using
      the Fargate launch type for serverless container execution.
    image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
